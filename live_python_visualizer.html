<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Python Debugger — AlgoPractice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- CodeMirror Core and Theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    
    <style>
        :root {
            --bg-dark: #07090f;
            --bg-surface: #0d1117;
            --bg-elevated: #1e293b;
            --text-main: #e2e8f0;
            --text-muted: #475569;
            --accent: #a78bfa;
            --border: #1e293b;
            --font-main: 'Outfit', sans-serif;
            --font-code: 'JetBrains Mono', ui-monospace, SFMono-Regular, Consolas, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(160deg, #120825 0%, #0d1117 55%, #071828 100%);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .left-pane {
            width: 0;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-surface);
            border-right: 0px solid var(--border);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        border-right-width 0.3s;
            position: relative;
        }

        .left-pane.open {
            width: 45%;
            border-right-width: 1px;
        }
        
        .pane-header {
            padding: 10px 16px;
            background-color: var(--bg-elevated);
            font-family: var(--font-code);
            font-size: 11px;
            font-weight: 600;
            color: #374151;
            border-bottom: 1px solid var(--border);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pane-dots { display: flex; gap: 5px; }
        .pane-dot { width: 9px; height: 9px; border-radius: 50%; }
        .pane-dot.red { background: #ef4444; }
        .pane-dot.yellow { background: #f59e0b; }
        .pane-dot.green { background: #22c55e; }

        .args-input {
            background: rgba(255,255,255,0.07);
            border: 1px solid #334155;
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 6px;
            font-family: var(--font-code);
            font-size: 12px;
            width: 340px;
            outline: none;
            transition: border-color 0.15s;
        }

        .args-input:focus {
            border-color: #a78bfa;
        }

        .args-label {
            font-size: 11px;
            color: #475569;
            font-family: var(--font-code);
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .right-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            position: relative;
        }

        .CodeMirror {
            flex: 1;
            font-family: var(--font-code);
            font-size: 15px;
            line-height: 1.6;
            height: auto !important; 
        }
        
        .CodeMirror-vscrollbar, .CodeMirror-hscrollbar {
            right: 0 !important;
        }

        .btn-edit {
            background: rgba(255,255,255,0.06);
            color: var(--text-muted-bright, #94a3b8);
            border: 1px solid #334155;
            padding: 9px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.03em;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
        }

        .btn-edit:hover { background: rgba(255,255,255,0.1); border-color: #a78bfa; color: #a78bfa; }
        .btn-edit.active { background: #160d30; border-color: #3730a3; color: #a78bfa; }

        .btn {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.04em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.25);
        }

        .btn:hover { background: linear-gradient(135deg, #6d28d9, #8b5cf6); box-shadow: 0 0 30px rgba(167, 139, 250, 0.4); }
        .btn:active { transform: scale(0.97); }

        .placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
            background-color: #f8fafc;
            text-align: center;
            padding: 40px;
        }
        
        .placeholder h2 {
            color: #334155;
            margin-bottom: 16px;
            font-size: 24px;
        }
        
        .placeholder p {
            max-width: 400px;
            line-height: 1.5;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="background:linear-gradient(135deg,#7c3aed,#a78bfa); width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; font-family:'Outfit',sans-serif; color:white; letter-spacing:0.02em;">Py</div>
            <div>
                <div style="font-weight:700; font-size:15px; font-family:'Outfit',sans-serif; color:#e2e8f0;">Live Python Debugger</div>
                <div style="font-size:11px; color:#475569; font-family:'JetBrains Mono',monospace; letter-spacing:0.06em;">LEETCODE MODE</div>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:10px; flex:1; margin: 0 24px;">
            <span class="args-label">TEST ARGS:</span>
            <div style="display:flex; flex-direction:column; gap:4px; flex:1;">
                <input type="text" id="test_args" class="args-input" placeholder='e.g. [2,7,11,15], 9  OR  "racecar"' style="width: 100%;">
                <div id="args_hint_display" style="font-size: 10px; font-family: var(--font-code); color: #475569; letter-spacing: 0.05em;">Detecting...</div>
            </div>
        </div>
        <button class="btn-edit" id="edit-btn" onclick="toggleEditor()">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            Edit Code
        </button>
        <button class="btn" onclick="runCode()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Visualize
        </button>
    </header>

    <div class="main-container">
        <!-- Editor Pane (slide-in panel) -->
        <div class="left-pane" id="left-pane">
            <div class="pane-header"><div class="pane-dots"><div class="pane-dot red"></div><div class="pane-dot yellow"></div><div class="pane-dot green"></div></div>code_editor.py</div>
            <textarea id="code_input"></textarea>
        </div>
        
        <!-- Visualizer Pane -->
        <div class="right-pane">
            <div class="pane-header" style="background-color: #f1f5f9; color: #475569; border-bottom: 1px solid #cbd5e1; font-family: 'JetBrains Mono', monospace;">memory_state.viz</div>
            
            <div id="placeholder" class="placeholder">
                <h2>Ready to Trace</h2>
                <p>Paste a LeetCode <b>class Solution:</b> block! The tool will automatically instantiate it, call your method with the arguments you provide at the bottom, and map out the memory state.</p>
            </div>
            
            <iframe id="tutor_iframe" style="display: none;"></iframe>
        </div>
    </div>

    <!-- CodeMirror Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <script>
        const defaultCode = 
`class Solution:
    def isPalindrome(self, s: str) -> bool:
        # Pointers matching pattern
        left, right = 0, len(s) - 1
        
        while left < right:
            while left < right and not s[left].isalnum(): left += 1
            while left < right and not s[right].isalnum(): right -= 1
            
            if s[left].lower() != s[right].lower():
                return False
                
            left += 1
            right -= 1
            
        return True
`;

        const editor = CodeMirror.fromTextArea(document.getElementById("code_input"), {
            mode: "python",
            theme: "dracula",
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            indentWithTabs: false,
            extraKeys: {
                "Tab": function(cm) {
                    if (cm.somethingSelected()) {
                        cm.indentSelection("add");
                    } else {
                        cm.replaceSelection(Array(cm.getOption("indentUnit") + 1).join(" "), "end", "+input");
                    }
                },
                "Shift-Tab": function(cm) {
                    cm.indentSelection("subtract");
                }
            }
        });

        editor.setValue(defaultCode);
        document.getElementById('test_args').value = '"A man, a plan, a canal: Panama"';

        // --- SMART ARGUMENT DETECTOR ---
        function updateArgsHint() {
            const code = editor.getValue();
            // Find the first method inside class Solution (the public entry method)
            // We look for lines indented with exactly 4 spaces: "    def methodName(self..."
            const match = code.match(/^    def\s+([a-zA-Z0-9_]+)\s*\(\s*self\s*(?:,\s*([^)]*))?\)/m)
                       || code.match(/def\s+([a-zA-Z0-9_]+)\s*\(\s*self\s*(?:,\s*([^)]*))?\)/);
            
            const hintDisplay = document.getElementById('args_hint_display');
            const inputField = document.getElementById('test_args');
            
            if (match) {
                const methodName = match[1];
                const rawArgs = match[2] || "";
                
                // Split by comma but ignore commas inside brackets (for type hints)
                let splitArgs = [];
                let current = "";
                let depth = 0;
                for (let char of rawArgs) {
                    if (char === '[') depth++;
                    if (char === ']') depth--;
                    if (char === ',' && depth === 0) {
                        splitArgs.push(current);
                        current = "";
                    } else {
                        current += char;
                    }
                }
                if (current.trim()) splitArgs.push(current);

                const args = splitArgs.map(a => a.split(':')[0].trim())
                                     .filter(a => a && a !== 'self');
                
                if (args.length > 0) {
                    hintDisplay.textContent = `Needs ${args.length} args: (${args.join(', ')})`;
                    hintDisplay.style.color = '#a78bfa';
                    inputField.placeholder = `e.g. ${args.map(() => 'val').join(', ')}`;
                } else {
                    hintDisplay.textContent = `No args needed besides self.`;
                    hintDisplay.style.color = '#475569';
                    inputField.placeholder = 'No args needed';
                }
            } else {
                hintDisplay.textContent = 'No Solution method detected.';
                hintDisplay.style.color = '#ef4444';
            }
        }

        editor.on('change', () => {
            updateArgsHint();
        });

        // Initialize hint
        updateArgsHint();

        function toggleEditor() {
            const pane = document.getElementById('left-pane');
            const btn = document.getElementById('edit-btn');
            const isOpen = pane.classList.toggle('open');
            btn.classList.toggle('active', isOpen);
            // Update the text node after the SVG
            const textNode = [...btn.childNodes].find(n => n.nodeType === 3);
            if (textNode) textNode.textContent = isOpen ? '\n            Close Editor\n        ' : '\n            Edit Code\n        ';
            if (isOpen) setTimeout(() => editor.refresh(), 310);
        }

        function runCode() {
            let code = editor.getValue().trim();
            if (!code) {
                alert("Please write some Python code first!");
                return;
            }

            // --- AUTO-INJECT TYPING IMPORTS ---
            const typingImport = 'from typing import List, Optional, Dict, Tuple, Set';
            if (!code.includes('from typing import')) {
                code = typingImport + '\n' + code;
            }

            // --- LEETCODE AUTO-PARSER ---
            if (code.includes('class Solution')) {
                // Find the first method inside class Solution that takes 'self'
                // Matches: def methodName(self, ...) — skips nested helpers like union/find
                const classMatch = code.match(/class Solution[\s\S]*?(?=\nclass |\Z)/);
                const classBody = classMatch ? classMatch[0] : code;
                const methodMatch = classBody.match(/def\s+([a-zA-Z0-9_]+)\s*\(\s*self/);

                if (methodMatch) {
                    const methodName = methodMatch[1];
                    let args = document.getElementById('test_args').value.trim();
                    if (!args) args = 'None'; 
                    // Append the instantiation and call
                    code += `\n\n# --- Auto-Generated Execution ---\n_sol = Solution()\n_result = _sol.${methodName}(${args})\nprint("Returned:", _result)`;
                }
            }

            const encodedCode = encodeURIComponent(code);
            
            const url = `https://pythontutor.com/iframe-embed.html?t=${Date.now()}#code=${encodedCode}&cumulative=false&heapPrimitives=nevernest&mode=display&origin=opt-frontend.js&py=3&rawInputLstJSON=%5B%5D&textReferences=false`;
            
            document.getElementById('placeholder').style.display = 'none';
            const iframe = document.getElementById('tutor_iframe');
            
            // Force a hard reload of the iframe first
            iframe.src = 'about:blank';
            setTimeout(() => {
                iframe.style.display = 'block';
                iframe.src = url;
            }, 50);
            
            const btn = document.querySelector('.btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Executing...';
            setTimeout(() => { btn.innerHTML = originalText; }, 600);
        }
    </script>
</body>
</html>
