<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Patterns Visualizer — AlgoPractice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07090f;
            --card-bg: #0d1117;
            --code-bg: #020408;
            --border: #1e293b;
            --color-sw: #14b8a6;
            --color-tp: #f59e0b;
            --text-main: #e2e8f0;
            --text-muted: #475569;
            --text-muted-bright: #94a3b8;
            --font-main: 'Outfit', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .page-header {
            background: linear-gradient(160deg, #120825 0%, #0d1117 55%, #071828 100%);
            border-bottom: 1px solid var(--border);
            padding: 44px 28px 22px;
            position: relative;
            text-align: center;
        }

        .nav-back {
            position: absolute;
            top: 22px;
            left: 28px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.15s;
            font-weight: 600;
            font-size: 13px;
        }

        .nav-back:hover { color: var(--text-main); }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #14b8a6, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .page-header p { color: var(--text-muted); font-size: 13px; }

        /* ── LAYOUT ── */
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 28px;
        }

        /* ── VISUALIZER CARD ── */
        .visualizer-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .vis-header {
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dots { display: flex; gap: 5px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; }
        .dot.red { background: #ef4444; }
        .dot.yellow { background: #f59e0b; }
        .dot.green { background: #22c55e; }
        .vis-title { font-size: 10px; color: #374151; letter-spacing: 0.08em; margin-left: 4px; }

        .vis-body { padding: 24px; }

        /* ── CONTROLS ── */
        .playground-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .play-btn {
            background: #1e293b;
            color: var(--text-muted-bright);
            border: 1px solid var(--border);
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 12px;
            font-weight: 600;
            transition: all 0.15s;
            letter-spacing: 0.04em;
        }

        .play-btn:hover {
            background: #334155;
            color: var(--text-main);
            border-color: #a78bfa;
        }

        /* ── ARRAY ── */
        .array-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 3rem 0 2rem;
            position: relative;
            padding-bottom: 2rem;
        }

        .array-cell {
            width: 56px;
            height: 56px;
            background: #0a0f1a;
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 600;
            font-family: var(--font-code);
            position: relative;
            transition: all 0.3s;
        }

        .pointer {
            position: absolute;
            bottom: -35px;
            font-size: 11px;
            font-weight: bold;
            font-family: var(--font-code);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .pointer::before {
            content: '↑';
            font-size: 1.2rem;
            margin-bottom: -4px;
        }

        .ptr-l { color: var(--color-tp); }
        .ptr-r { color: var(--color-sw); }

        .window-highlight {
            position: absolute;
            top: -5px; bottom: -5px;
            background: rgba(20, 184, 166, 0.08);
            border: 2px dashed var(--color-sw);
            border-radius: 10px;
            z-index: 0;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
        }

        /* ── DESCRIPTION ── */
        .play-desc {
            text-align: center;
            color: var(--text-muted-bright);
            min-height: 3.5rem;
            font-size: 13px;
            margin-top: 16px;
            line-height: 1.75;
        }

        /* ── STATUS PANEL ── */
        .status-panel {
            background: var(--code-bg);
            border: 1px solid #1a2436;
            border-radius: 8px;
            padding: 14px 18px;
            margin-top: 16px;
            display: flex;
            justify-content: space-around;
            font-family: var(--font-code);
            font-size: 12px;
        }

        .status-item { color: var(--text-muted); }
        .status-item span { font-weight: 600; }
    </style>
</head>
<body>

    <div class="page-header">
        <a href="array_patterns_masterclass.html" class="nav-back">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Masterclass
        </a>
        <h1>Array Patterns Visualizer</h1>
        <p>Problem: Longest Substring Without Repeating Characters ("abcabcbb")</p>
    </div>

    <div class="container">
        <div class="visualizer-card">
            <div class="vis-header">
                <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
                <span class="vis-title">sliding_window.py — interactive</span>
            </div>
            <div class="vis-body">
                <div class="playground-controls">
                    <button class="play-btn" onclick="pgStep()">▶ Step Forward</button>
                    <button class="play-btn" onclick="pgReset()">↺ Reset</button>
                </div>

                <div class="array-container" id="pg-array">
                    <div class="window-highlight" id="pg-window"></div>
                </div>

                <p class="play-desc" id="pg-desc">Click "Step Forward" to start iterating 'r'.</p>

                <div class="status-panel">
                    <div class="status-item">State (Set): <span id="pg-state" style="color:var(--color-sw)">{}</span></div>
                    <div class="status-item">Best Length: <span id="pg-best" style="color:var(--color-tp)">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const pStr = "abcabcbb".split('');
        let l = 0, r = 0, stateSet = new Set(), bestLen = 0;
        let pgState = 1; // 1=expand, 2=shrink
        
        const cont = document.getElementById('pg-array');
        const winHighlight = document.getElementById('pg-window');
        const descTxt = document.getElementById('pg-desc');
        const stateTxt = document.getElementById('pg-state');
        const bestTxt = document.getElementById('pg-best');

        function pgInit() {
            cont.innerHTML = '';
            cont.appendChild(winHighlight);
            pStr.forEach((char, i) => {
                const cell = document.createElement('div');
                cell.className = 'array-cell';
                cell.innerText = char;
                cell.id = `cell-${i}`;
                cont.appendChild(cell);
            });
            pgReset();
        }

        function pgReset() {
            l = 0; r = 0; stateSet.clear(); bestLen = 0; pgState = 1;
            updateUI();
            descTxt.innerText = "Click Step Forward to process the first character.";
        }

        function pgStep() {
            if (r >= pStr.length && stateSet.size === 0) {
                descTxt.innerText = "Execution complete. Reset to try again.";
                return;
            }

            const charR = pStr[r];
            if (stateSet.has(charR)) {
                pgState = 2;
                const charL = pStr[l];
                stateSet.delete(charL);
                descTxt.innerText = `SHRINK: '${charR}' duplicate! Removing '${charL}' from left.`;
                l++;
            } else {
                if (pgState === 2) {
                    descTxt.innerText = `Condition fixed. Adding '${charR}'.`;
                    pgState = 1;
                } else {
                    stateSet.add(charR);
                    bestLen = Math.max(bestLen, r - l + 1);
                    descTxt.innerText = `EXPAND: Added '${charR}'. Valid size: ${r - l + 1}. Updating Best.`;
                    if(r < pStr.length - 1) r++;
                    else descTxt.innerText += " Reached end.";
                }
            }
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.pointer').forEach(el => el.remove());
            if(l < pStr.length) document.getElementById(`cell-${l}`).innerHTML += `<div class="pointer ptr-l">L</div>`;
            if(r < pStr.length) document.getElementById(`cell-${r}`).innerHTML += `<div class="pointer ptr-r" style="left:5px">R</div>`;
            
            if(l < pStr.length && r < pStr.length && l <= r) {
                const lCell = document.getElementById(`cell-${l}`);
                const rCell = document.getElementById(`cell-${r}`);
                winHighlight.style.left = `${lCell.offsetLeft - 5}px`;
                winHighlight.style.width = `${(rCell.offsetLeft + rCell.offsetWidth - lCell.offsetLeft) + 10}px`;
                winHighlight.style.display = 'block';
            } else { winHighlight.style.display = 'none'; }

            document.querySelectorAll('.array-cell').forEach((c, i) => {
                if (i >= l && i <= r && !stateSet.has(pStr[r]) && pgState !== 2) c.style.borderColor = "var(--color-sw)";
                else if (i === r && pgState === 2) c.style.borderColor = "#ef4444";
                else c.style.borderColor = "var(--border)";
            });

            stateTxt.innerText = `{ ${Array.from(stateSet).join(', ')} }`;
            bestTxt.innerText = bestLen;
        }

        pgInit();
    </script>
</body>
</html>
