<head>

    <title>Binary Search Pattern Master Class</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.85);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #1f6feb;
            --lo-color: #ff7b72;
            --hi-color: #d2a8ff;
            --mid-color: #7ee787;

            --code-bg: #0d1117;
            --highlight-bg: rgba(88, 166, 255, 0.2);
            --highlight-border: #58a6ff;
            --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;

            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 50% 0%, #171f2c 0%, var(--bg-color) 70%);
            color: var(--text-main);
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 1rem 2rem 1rem 160px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            z-index: 10;
            position: relative;
        }

        .nav-back {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 48px;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: color 0.15s;
            white-space: nowrap;
        }
        .nav-back svg { width: 16px; height: 16px; flex-shrink: 0; }
        .nav-back:hover { color: var(--text-main); }

        .title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            color: var(--accent);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
        }

        .tab {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .tab:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab.active {
            color: var(--accent);
            border: 1px solid var(--panel-border);
            background: rgba(88, 166, 255, 0.1);
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .left-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            gap: 1.5rem;
            overflow-y: auto;
            border-right: 1px solid var(--panel-border);
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--code-bg);
            border-left: 1px solid var(--panel-border);
            position: relative;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            background: var(--panel-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            backdrop-filter: blur(8px);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex: 1;
        }

        .input-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            color: var(--text-main);

            border-radius: 6px;
            cursor: pointer;

            background: rgba(255, 255, 255, 0.15);
        }

            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;

        .legend {

            gap: 1rem;
            justify-content: center;
            font-size: 0.85rem;

            border: 2px solid var(--panel-border);

            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

        .array-index {

        .pointer-container {

        .pointer-lo { color: var(--lo-color); }
        .pointer-hi { color: var(--hi-color); }

    <main>
        <div class="left-panel">
            <div class="controls">
                <div class="input-group">
                    <label for="array-input">Array (comma separated)</label>

                    </div>

                <div class="legend-item"><div class="legend-color" style="background:var(--lo-color)"></div> <span>lo / left</span></div>

    <script>
        // State
        let currentMode = 1;
        let isPlaying = false;
        let playInterval = null;
        let currentStepIndex = 0;
        let steps = [];
        let parsedArray = [];
        let parsedTarget = null;
        let hasStarted = false;

        // Guides
        const guides = {
            1: `<h3>Key Takeaway: Exact Search</h3>
                <p>This is the standard binary search template used to find an exact target value in a sorted array.</p>
                <ul>
                    <li><strong>Condition:</strong> <code>while lo <= hi</code>. We use <code><=</code> because an array of size 1 could contain the target.</li>
                    <li><strong>Mid Calculation:</strong> <code>mid = (lo + hi) // 2</code>.</li>
                    <li><strong>Pointer Updates:</strong> <code>lo = mid + 1</code> and <code>hi = mid - 1</code>. Since we already checked <code>mid</code> and it wasn't the target, we safely eliminate it from the search space.</li>
                    <li><strong>Termination:</strong> Returns the <code>mid</code> index immediately if found, or <code>-1</code> after the loop if the target doesn't exist.</li>
                </ul>`,
            2: `<h3>Key Takeaway: Minimum in Rotated Array</h3>
                <p>Used to find the pivot point (minimum element) in a sorted array that has been rotated.</p>
                <ul>
                    <li><strong>Condition:</strong> <code>while lo < hi</code>. We terminate when <code>lo == hi</code>, pointing directly at the minimum element.</li>
                    <li><strong>Comparison:</strong> We compare <code>nums[mid]</code> against <code>nums[right]</code> (the last element in our active window). This tells us which half contains the rotation pivot.</li>
                    <li><strong>Pointer Updates:</strong> If <code>nums[mid] > nums[right]</code>, the minimum <em>must</em> be to the right of <code>mid</code>, so <code>lo = mid + 1</code>. Otherwise, the right side is sorted, so the minimum is at <code>mid</code> or to its left, meaning <code>hi = mid</code>.</li>
                </ul>`,
            3: `<h3>Key Takeaway: First & Last Position (Boundaries)</h3>
                <p>Instead of finding just <em>any</em> match, we want the extreme boundaries of a target value. Squeeze your boundaries toward the side you care about while keeping <code>mid</code> alive just in case it's the edge.</p>
                <p><strong>The "Am I too small?" Intuition (<code>nums[mid] < target</code>):</strong></p>
                <ul>
                    <li><strong>Find Leftmost:</strong> If <code>nums[mid] < target</code>, we must go right (<code>lo = mid + 1</code>). Otherwise, it's <code>>= target</code>, so we've found it OR overshot. Squeeze the right side: <code>hi = mid</code>.</li>
                    <li><strong>Find Rightmost:</strong> If <code>nums[mid] <= target</code>, we must keep moving right (<code>lo = mid</code>). Otherwise, it's strictly larger, so we overshoot. Squeeze the left side: <code>hi = mid - 1</code>.</li>
                    <li><strong>Mid Bias (Crucial!):</strong> In the rightward search, we calculate <code>mid = (lo + hi + 1) // 2</code>. This biases the midpoint upward. Without this <code>+1</code>, if <code>lo</code> and <code>hi</code> are adjacent (e.g., indices 0 and 1) and <code>lo</code> becomes <code>mid</code>, we would enter an infinite loop!</li>
                </ul>
                <details style="margin-top: 10px; cursor: pointer;">
                    <summary style="color: var(--accent); font-weight: bold;">Show Intuitive Code Template</summary>
                    <pre style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-top: 5px; white-space: pre-wrap; color: var(--text-main);"><code>class Solution:
    def searchRange(self, nums: List[int], target: int) -> List[int]:
        if not nums: return [-1,-1]
        
        # 1. Finding First (Leftmost)
        lo, hi = 0, len(nums)-1
        while lo < hi:
            mid = (lo + hi) // 2
            if nums[mid] < target:
                lo = mid + 1    # Strictly too small, go right
            else:
                hi = mid        # Found target OR too big. Keep going left, but keep mid!
                
        first = lo if nums[lo] == target else -1
        if first == -1: return [-1,-1]
        
        # 2. Finding Last (Rightmost)
        lo, hi = 0, len(nums)-1
        while lo < hi:
            mid = (lo + hi + 1) // 2
            if nums[mid] <= target:
                lo = mid        # Found target OR too small. Keep going right, but keep mid!
            else:
                hi = mid - 1    # Strictly too big, go left
                
        last = lo if nums[lo] == target else -1
        return [first, last]</code></pre>
                </details>`,
            4: `<h3>Key Takeaway: First True in Boolean Array</h3>
                <p>This is the most powerful and versatile binary search pattern. It's used for "Search Insert Position", "Minimax", and "Capacity" problems.</p>
                <ul>
                    <li><strong>Concept:</strong> Map your problem space to a boolean array: <code>[False, False, False, True, True, True]</code>. Your goal is to find the index of the <em>first</em> <code>True</code> condition.</li>
                    <li><strong>Condition:</strong> <code>while lo < hi</code>.</li>
                    <li><strong>Pointer Updates:</strong> If the condition is <code>True</code> at <code>mid</code>, the first <code>True</code> could be this one or to its left, so <code>hi = mid</code>. If <code>False</code>, it must be strictly to the right, so <code>lo = mid + 1</code>.</li>
                    <li><strong>Check after Loop:</strong> Since we narrowed down to one element, we must evaluate the condition one last time on <code>lo</code> to ensure it's actually <code>True</code>.</li>
                </ul>`
        };

        // Default Data
        const defaults = {
            1: { arr: "2, 3, 5, 7, 11, 13, 17, 19, 23", target: "7" },
            2: { arr: "15, 18, 2, 3, 6, 12", target: "" }, // Rotated
            3: { arr: "1, 2, 2, 2, 3, 4, 5, 5, 6", target: "2" }, // Duplicates
            4: { arr: "2, 3, 5, 7, 9, 11, 13", target: "7" } // Boolean Pattern preview
        };

        // Source Codes
        const codes = {
            1: `def binary_search(arr, target):
    lo, hi = 0, len(arr) - 1

    while lo <= hi:
        mid = (lo + hi) // 2

        if arr[mid] == target:
            return mid
        elif arr[mid] < target:
            lo = mid + 1
        else:
            hi = mid - 1

    return -1`,

            2: `def findMin(self, nums):
    left, right = 0, len(nums) - 1

    while left < right:
        mid = (left + right) // 2

        if nums[mid] > nums[right]:
            left = mid + 1
        else:
            right = mid

    return nums[left]`,

            3: `def searchRange(nums, target):
    def find_left():
        lo, hi = 0, len(nums) - 1
        while lo < hi:
            mid = (lo + hi) // 2
            if nums[mid] < target:
                lo = mid + 1
            else:
                hi = mid
        return lo if nums[lo] == target else -1

    def find_right():
        lo, hi = 0, len(nums) - 1
        while lo < hi:
            mid = (lo + hi + 1) // 2
            if nums[mid] > target:
                hi = mid - 1
            else:
                lo = mid
        return lo if nums[lo] == target else -1

    return [find_left(), find_right()]`,

            4: `def first_true(arr, condition):
    lo, hi = 0, len(arr) - 1

    while lo < hi:
        mid = (lo + hi) // 2

        if condition(arr[mid]):
            hi = mid
        else:
            lo = mid + 1

    return lo if condition(arr[lo]) else -1`
        };

        // Initialize UI
        function initUI() {
            switchMode(1);
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');
            
            // Set default inputs
            document.getElementById('array-input').value = defaults[mode].arr;
            
            if (mode === 2) {
                document.getElementById('target-group').style.display = 'none';
                document.getElementById('condition-group').style.display = 'none';
            } else if (mode === 4) {
                document.getElementById('target-group').style.display = 'none';
                document.getElementById('condition-group').style.display = 'flex';
                document.getElementById('target-condition-input').value = defaults[mode].target;
            } else {
                document.getElementById('target-group').style.display = 'flex';
                document.getElementById('condition-group').style.display = 'none';
                document.getElementById('target-input').value = defaults[mode].target;
            }

            document.getElementById('guide-box').innerHTML = guides[mode];

            renderCode();
            resetVisualizer();
        }

        function renderCode() {
            const codePanel = document.getElementById('code-panel');
            const lines = codes[currentMode].split('\n');
            let html = '';
            
            lines.forEach((line, index) => {
                // Safely encode brackets first
                let formatted = line.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                
                // Use non-printable characters as temporary placeholders so we don't accidentally replace inside HTML tags
                formatted = formatted
                    .replace(/\b(def|return|while|if|elif|else)\b/g, '\x01$1\x02')
                    .replace(/\b(binary_search|findMin|searchRange|find_left|find_right|first_true|len)\b/g, '\x03$1\x04')
                    .replace(/\b(\d+)\b/g, '\x05$1\x06')
                    .replace(/(\+|-|\/\/|==|&lt;=|&gt;=|&lt;|&gt;|=)/g, '\x07$1\x08');
                    
                // Swap placeholders for actual span tags
                formatted = formatted
                    .replace(/\x01/g, '<span class="kw">').replace(/\x02/g, '</span>')
                    .replace(/\x03/g, '<span class="fn">').replace(/\x04/g, '</span>')
                    .replace(/\x05/g, '<span class="num">').replace(/\x06/g, '</span>')
                    .replace(/\x07/g, '<span class="op">').replace(/\x08/g, '</span>');

                html += `
                    <div class="code-line" id="line-${index + 1}">
                        <div class="line-number">${index + 1}</div>
                        <div class="line-content">${formatted}</div>
                        <div class="condition-flash" id="flash-${index + 1}"></div>
                    </div>
                `;
            });
            codePanel.innerHTML = html;
        }

        function parseInputs() {
            const arrStr = document.getElementById('array-input').value;
            parsedArray = arrStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            
            if (currentMode === 4) {
                parsedTarget = parseInt(document.getElementById('target-condition-input').value);
            } else {
                parsedTarget = parseInt(document.getElementById('target-input').value);
            }
        }

        // ====== STEP GENERATORS ======
        function generateStepsMode1() {
            let s = [];
            let lo = 0, hi = parsedArray.length - 1;
            const target = parsedTarget;
            
            s.push({lo, hi, mid: null, range: [lo, hi], line: 2, msg: `Initialize <code>lo = 0</code>, <code>hi = len(arr) - 1 = ${hi}</code>.`});
            
            while (lo <= hi) {
                s.push({lo, hi, mid: null, range: [lo, hi], line: 4, msg: `Loop condition <code>lo <= hi</code> (${lo} <= ${hi}) is True.`});
                let mid = Math.floor((lo + hi) / 2);
                s.push({lo, hi, mid, range: [lo, hi], line: 5, msg: `Calculate <code>mid = (${lo} + ${hi}) // 2 = ${mid}</code>.`});
                
                let val = parsedArray[mid];
                let isEq = val === target;
                s.push({lo, hi, mid, range: [lo, hi], line: 7, cond: isEq, msg: `Check if <code>arr[mid]</code> (${val}) == <code>target</code> (${target}).`});
                
                if (isEq) {
                    s.push({lo, hi, mid, range: [lo, hi], found: mid, line: 8, msg: `Target ${target} found at index ${mid}. Returning early!`});
                    return s;
                }
                
                let isLess = val < target;
                s.push({lo, hi, mid, range: [lo, hi], line: 9, cond: isLess, msg: `Not equal. Check if <code>arr[mid]</code> (${val}) < <code>target</code> (${target}).`});
                
                if (isLess) {
                    lo = mid + 1;
                    s.push({lo, hi, mid: null, range: [lo, hi], line: 10, msg: `Value is less than target, so ${target} must be in the right half. Moving left pointer up to <code>mid + 1</code> (${lo}).`});
                } else {
                    s.push({lo, hi, mid, range: [lo, hi], line: 11, msg: `Value (${val}) is greater than target (${target}).`});
                    hi = mid - 1;
                    s.push({lo, hi, mid: null, range: [lo, hi], line: 12, msg: `${target} must be in the left half. Moving right pointer down to <code>mid - 1</code> (${hi}).`});
                }
            }
            s.push({lo, hi, mid: null, range: [lo, hi], line: 4, msg: `Loop condition <code>lo <= hi</code> (${lo} <= ${hi}) is False. Terminating loop.`});
            s.push({lo, hi, mid: null, range: [lo, hi], line: 14, msg: `Target ${target} was not found. Returning -1.`});
            return s;
        }

        function generateStepsMode2() {
            let s = [];
            let left = 0, right = parsedArray.length - 1;
            
            s.push({lo: left, hi: right, mid: null, range: [left, right], line: 2, msg: `Initialize <code>left = 0</code>, <code>right = ${right}</code>.`});
            
            while (left < right) {
                s.push({lo: left, hi: right, mid: null, range: [left, right], line: 4, msg: `Loop condition <code>left < right</code> (${left} < ${right}) is True.`});
                let mid = Math.floor((left + right) / 2);
                s.push({lo: left, hi: right, mid, range: [left, right], line: 5, msg: `Calculate <code>mid = (${left} + ${right}) // 2 = ${mid}</code>.`});
                
                let isGt = parsedArray[mid] > parsedArray[right];
                s.push({lo: left, hi: right, mid, range: [left, right], line: 7, cond: isGt, msg: `Compare <code>nums[mid]</code> (${parsedArray[mid]}) with <code>nums[right]</code> (${parsedArray[right]}).`});
                
                if (isGt) {
                    left = mid + 1;
                    s.push({lo: left, hi: right, mid: null, range: [left, right], line: 8, msg: `<code>${parsedArray[mid]} > ${parsedArray[right]}</code> means the pivot (minimum) is definitely strictly to the right of mid. Setting <code>left = mid + 1</code> (${left}).`});
                } else {
                    s.push({lo: left, hi: right, mid, range: [left, right], line: 9, msg: `<code>${parsedArray[mid]} <= ${parsedArray[right]}</code> means the right half is sorted, so the minimum is at mid or to its left.`});
                    right = mid;
                    s.push({lo: left, hi: right, mid: null, range: [left, right], line: 10, msg: `Setting <code>right = mid</code> (not mid-1!) because mid might BE the minimum.`});
                }
            }
            s.push({lo: left, hi: right, mid: null, range: [left, right], line: 4, msg: `Loop condition <code>left < right</code> (${left} < ${right}) is False. Loop terminates.`});
            s.push({lo: left, hi: right, mid: null, range: [left, right], found: left, line: 12, msg: `Left pointer and right pointer converged. Minimum is at index ${left} (Value: ${parsedArray[left]}).`});
            return s;
        }

        function generateStepsMode3Left() {
            let s = [];
            let lo = 0, hi = parsedArray.length - 1;
            let targ = parsedTarget;
            s.push({lo, hi, mid: null, range: [lo, hi], line: 3, msg: `[Find Leftmost] Init <code>lo=0, hi=${hi}</code>.`});
            while (lo < hi) {
                let mid = Math.floor((lo + hi) / 2);
                s.push({lo, hi, mid, range: [lo, hi], line: 5, msg: `[Find Leftmost] <code>mid = (${lo}+${hi})//2 = ${mid}</code>.`});
                let isLess = parsedArray[mid] < targ;
                s.push({lo, hi, mid, range: [lo, hi], line: 6, cond: isLess, msg: `[Find Leftmost] Check <code>nums[mid] < target</code> (${parsedArray[mid]} < ${targ}) -> ${isLess}`});
                if (isLess) {
                    lo = mid + 1;
                    s.push({lo, hi, mid: null, range: [lo, hi], line: 7, msg: `[Find Leftmost] Value is strictly less. Setting <code>lo = mid+1</code> (${lo}).`});
                } else {
                    hi = mid;
                    s.push({lo, hi, mid: null, range: [lo, hi], line: 9, msg: `[Find Leftmost] Value is >= target (we don't stop on eq!). Setting <code>hi = mid</code> (${hi}) to squeeze range leftwards.`});
                }
            }
            let found = parsedArray[lo] === targ ? lo : -1;
            s.push({lo, hi, mid: null, range: [lo, hi], found: found !== -1 ? lo : null, line: 10, msg: `[Find Leftmost] Terminated at index ${lo}. Leftmost occurrence is ${found !== -1 ? lo : "not found"}.`});
            return s;
        }

        function generateStepsMode3Right() {
            let s = [];
            let lo = 0, hi = parsedArray.length - 1;
            let targ = parsedTarget;
            s.push({lo, hi, mid: null, range: [lo, hi], line: 13, msg: `[Find Rightmost] Init <code>lo=0, hi=${hi}</code>.`});
            while (lo < hi) {
                let mid = Math.floor((lo + hi + 1) / 2);
                s.push({lo, hi, mid, range: [lo, hi], line: 15, msg: `[Find Rightmost] We bias mid upward here. If we used <code>(lo+hi)//2</code> and <code>lo=mid</code> was the only move available, mid would always equal lo and the loop would never terminate. <code>mid = (${lo}+${hi}+1)//2 = ${mid}</code>.`});
                let isGt = parsedArray[mid] > targ;
                s.push({lo, hi, mid, range: [lo, hi], line: 16, cond: isGt, msg: `[Find Rightmost] Check <code>nums[mid] > target</code> (${parsedArray[mid]} > ${targ}) -> ${isGt}`});
                if (isGt) {
                    hi = mid - 1;
                    s.push({lo, hi, mid: null, range: [lo, hi], line: 17, msg: `[Find Rightmost] Value is strictly greater. Setting <code>hi = mid-1</code> (${hi}).`});
                } else {
                    lo = mid;
                    s.push({lo, hi, mid: null, range: [lo, hi], line: 19, msg: `[Find Rightmost] Value is <= target (we don't stop on eq!). Setting <code>lo = mid</code> (${lo}) to squeeze range rightwards.`});
                }
            }
            let found = parsedArray[lo] === targ ? lo : -1;
            s.push({lo, hi, mid: null, range: [lo, hi], found: found !== -1 ? lo : null, line: 20, msg: `[Find Rightmost] Terminated at index ${lo}. Rightmost occurrence is ${found !== -1 ? lo : "not found"}.`});
            return s;
        }

        function generateStepsMode4() {
            let s = [];
            let lo = 0, hi = parsedArray.length - 1;
            let targ = parsedTarget;
            
            s.push({lo, hi, mid: null, range: [lo, hi], line: 2, msg: `Initialize <code>lo = 0</code>, <code>hi = ${hi}</code>.`});
            
            while (lo < hi) {
                s.push({lo, hi, mid: null, range: [lo, hi], line: 4, msg: `Loop condition <code>lo < hi</code> (${lo} < ${hi}) is True.`});
                let mid = Math.floor((lo + hi) / 2);
                s.push({lo, hi, mid, range: [lo, hi], line: 5, msg: `Calculate <code>mid = (${lo} + ${hi}) // 2 = ${mid}</code>.`});
                
                let cond = parsedArray[mid] >= targ;
                s.push({lo, hi, mid, range: [lo, hi], line: 7, cond: cond, msg: `Evaluate condition <code>arr[mid] >= ${targ}</code> (${parsedArray[mid]} >= ${targ}) -> <strong style="color:var(--${cond?'found':'lo'}-color)">${cond?'True':'False'}</strong>.`});
                
                if (cond) {
                    s.push({lo, hi, mid, range: [lo, hi], line: 8, msg: `Condition is True. The first True is either here or to the left.`});
                    hi = mid;
                    s.push({lo, hi, mid: null, range: [lo, hi], line: 8, msg: `Setting <code>hi = mid</code> (${hi}).`});
                } else {
                    s.push({lo, hi, mid, range: [lo, hi], line: 9, msg: `Condition is False. The first True must be strictly to the right.`});
                    lo = mid + 1;
                    s.push({lo, hi, mid: null, range: [lo, hi], line: 10, msg: `Setting <code>lo = mid + 1</code> (${lo}).`});
                }
            }
            s.push({lo, hi, mid: null, range: [lo, hi], line: 4, msg: `Loop condition <code>lo < hi</code> (${lo} < ${hi}) is False. Loop terminates.`});
            
            let finalCond = parsedArray[lo] >= targ;
            s.push({lo, hi, mid: null, range: [lo, hi], found: finalCond ? lo : null, line: 12, msg: `Converged at index ${lo}. <code>arr[${lo}] >= ${targ}</code> is ${finalCond?'True':'False'}. Returning ${finalCond ? lo : -1}.`});
            
            return s;
        }

        function buildSteps() {
            parseInputs();
            if (currentMode === 1) steps = generateStepsMode1();
            else if (currentMode === 2) steps = generateStepsMode2();
            else if (currentMode === 3) {
                let leftS = generateStepsMode3Left();
                let rightS = generateStepsMode3Right();
                steps = [];
                let maxL = Math.max(leftS.length, rightS.length);
                for(let i=0; i<maxL; i++) {
                    steps.push({
                        isDouble: true,
                        left: i < leftS.length ? leftS[i] : leftS[leftS.length-1],
                        right: i < rightS.length ? rightS[i] : rightS[rightS.length-1]
                    });
                }
                // add final return step
                let finalLeft = leftS[leftS.length-1];
                let finalRight = rightS[rightS.length-1];
                steps.push({
                    isDouble: true,
                    left: finalLeft,
                    right: finalRight,
                    forceLine: 22,
                    forceMsg: `Return the final array <code>[${finalLeft.found !== null ? finalLeft.found : -1}, ${finalRight.found !== null ? finalRight.found : -1}]</code>.`
                });
            }
            else if (currentMode === 4) steps = generateStepsMode4();

            currentStepIndex = 0;
            document.getElementById('total-steps').innerText = steps.length - 1;
        }

        function renderArrayState(container, array, state, prefix) {
            let html = '<div class="array-container">';
            array.forEach((val, i) => {
                let inRange = i >= state.range[0] && i <= state.range[1];
                let isLo = state.lo === i;
                let isHi = state.hi === i;
                let isMid = state.mid === i;
                let isFound = state.found === i;
                
                let classes = ['array-block'];
                if (!inRange) classes.push('faded');
                
                let borderColor = 'var(--panel-border)';
                if (isFound) borderColor = 'var(--found-color)';
                else if (isMid) borderColor = 'var(--mid-color)';
                else if (isLo && isHi) borderColor = 'linear-gradient(45deg, var(--lo-color) 50%, var(--hi-color) 50%)'; // complex, just fallback to one
                
                let style = '';
                if (isFound) style = `border-color: var(--found-color); background: rgba(34, 197, 94, 0.1);`;
                else if (isMid) style = `border-color: var(--mid-color); box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);`;
                else if (isLo) style = `border-color: var(--lo-color);`;
                else if (isHi) style = `border-color: var(--hi-color);`;

                let boolBadge = '';
                if (currentMode === 4) {
                    let cond = val >= parsedTarget;
                    boolBadge = `<div class="bool-badge ${cond?'true':'false'}">${cond?'T':'F'}</div>`;
                }

                html += `
                <div class="array-block-wrapper">
                    <div class="pointer-container">
                        ${isFound ? `<span class="pointer-found">found</span>` : ''}
                        ${!isFound && isMid ? `<span class="pointer-mid">mid</span>` : ''}
                    </div>
                    <div class="${classes.join(' ')}" style="${style}">
                        ${boolBadge}
                        ${val}
                    </div>
                    <div class="array-index">${i}</div>
                    <div class="pointer-container">
                        ${isLo && isHi && !isFound ? `<span class="pointer-lo">lo</span><span class="pointer-hi">hi</span>` : ''}
                        ${isLo && !isHi && !isFound ? `<span class="pointer-lo">${prefix==='Right'?'lo':'lo'}</span>` : ''}
                        ${isHi && !isLo && !isFound ? `<span class="pointer-hi">${prefix==='Right'?'hi':'hi'}</span>` : ''}
                    </div>
                </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderVisualization() {
            const vizArea = document.getElementById('viz-area');
            const expBox = document.getElementById('explanation-box');
            let step = steps[currentStepIndex];
            
            document.getElementById('step-counter').innerText = currentStepIndex;

            // Clear active lines
            document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active'));
            // Clear flashes
            document.querySelectorAll('.condition-flash').forEach(el => {
                el.classList.remove('show-true', 'show-false');
                el.innerText = '';
            });

            if (currentMode === 3) {
                // Dual view
                vizArea.innerHTML = `
                    <div class="dual-array">
                        <div class="array-section">
                            <div class="array-label">find_left() execution</div>
                            <div id="left-array"></div>
                        </div>
                        <div class="array-section">
                            <div class="array-label">find_right() execution</div>
                            <div id="right-array"></div>
                        </div>
                    </div>
                `;
                renderArrayState(document.getElementById('left-array'), parsedArray, step.left, 'Left');
                renderArrayState(document.getElementById('right-array'), parsedArray, step.right, 'Right');
                
                if (step.forceMsg) {
                    expBox.innerHTML = `<div class="explanation-content">${step.forceMsg}</div>`;
                    if (step.forceLine) document.getElementById(`line-${step.forceLine}`).classList.add('active');
                } else {
                    expBox.innerHTML = `
                        <div class="explanation-content" style="border-left:3px solid var(--lo-color); padding-left:10px;">${step.left.msg}</div>
                        <div style="height:1px; background:var(--panel-border); margin:10px 0;"></div>
                        <div class="explanation-content" style="border-left:3px solid var(--hi-color); padding-left:10px;">${step.right.msg}</div>
                    `;
                    document.getElementById(`line-${step.left.line}`).classList.add('active');
                    document.getElementById(`line-${step.right.line}`).classList.add('active');
                    // Scroll to first line
                    document.getElementById(`line-${Math.min(step.left.line, step.right.line)}`).scrollIntoView({behavior: 'smooth', block: 'center'});

                    // Flash cond if needed
                    if (step.left.cond !== undefined) {
                        let flashLeft = document.getElementById(`flash-${step.left.line}`);
                        flashLeft.innerText = step.left.cond ? 'True' : 'False';
                        flashLeft.classList.add(step.left.cond ? 'show-true' : 'show-false');
                    }
                    if (step.right.cond !== undefined) {
                        let flashRight = document.getElementById(`flash-${step.right.line}`);
                        flashRight.innerText = step.right.cond ? 'True' : 'False';
                        flashRight.classList.add(step.right.cond ? 'show-true' : 'show-false');
                    }
                }
            } else {
                // Single view
                vizArea.innerHTML = `<div id="single-array"></div>`;
                renderArrayState(document.getElementById('single-array'), parsedArray, step, '');
                expBox.innerHTML = step.msg;
                
                let activeLine = document.getElementById(`line-${step.line}`);
                if (activeLine) {
                    activeLine.classList.add('active');
                    activeLine.scrollIntoView({behavior: 'smooth', block: 'center'});
                }

                if (step.cond !== undefined) {
                    let flash = document.getElementById(`flash-${step.line}`);
                    if (flash) {
                        flash.innerText = step.cond ? 'True' : 'False';
                        flash.classList.add(step.cond ? 'show-true' : 'show-false');
                    }
                }
            }
        }

        // Controls
        function resetVisualizer() {
            hasStarted = false;
            isPlaying = false;
            clearInterval(playInterval);
            document.getElementById('play-pause-btn').innerText = 'Play';
            document.getElementById('viz-area').innerHTML = '';
            document.getElementById('explanation-box').innerHTML = 'Configure inputs and press Start to initialize the visualization.';
            document.getElementById('step-counter').innerText = '0';
            document.getElementById('total-steps').innerText = '0';
            document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active'));
            // Remove error styles
            document.getElementById('array-input').style.borderColor = '';
        }

        function startVisualizer() {
            try {
                buildSteps();
                hasStarted = true;
                renderVisualization();
            } catch (e) {
                document.getElementById('explanation-box').innerHTML = 'Invalid input format. Please check the array and target.';
                document.getElementById('array-input').style.borderColor = 'var(--lo-color)';
            }
        }

        function nextStep() {
            if (!hasStarted) startVisualizer();
            else if (currentStepIndex < steps.length - 1) {
                currentStepIndex++;
                renderVisualization();
            } else {
                pause();
            }
        }

        function prevStep() {
            if (hasStarted && currentStepIndex > 0) {
                currentStepIndex--;
                renderVisualization();
            }
        }

        function togglePlay() {
            if (!hasStarted) startVisualizer();
            if (currentStepIndex >= steps.length - 1 && !isPlaying) {
                currentStepIndex = 0; // Restart if at end
                renderVisualization();
            }

            if (isPlaying) pause();
            else play();
        }

        function play() {
            isPlaying = true;
            document.getElementById('play-pause-btn').innerText = 'Pause';
            playInterval = setInterval(() => {
                if (currentStepIndex < steps.length - 1) {
                    currentStepIndex++;
                    renderVisualization();
                } else {
                    pause();
                }
            }, 700);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-pause-btn').innerText = 'Play';
            clearInterval(playInterval);
        }

        // Init
        window.onload = initUI;
    </script>
</body>
</html>
